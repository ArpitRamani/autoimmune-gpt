services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in a .env file first}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-gemini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-claude-haiku-4-5}
    volumes:
      - ./data:/app/data
      - ./backend/store:/app/backend/store
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
